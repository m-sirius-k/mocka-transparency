<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">

<style>
.title { font: bold 34px sans-serif; fill:#ffffff; }
.header { font: bold 22px sans-serif; fill:#ffffff; }
.label { font: 18px sans-serif; fill:#e5e7eb; }
.small { font: 16px sans-serif; fill:#cbd5e1; }

.box { fill:#1f2937; stroke:#60a5fa; stroke-width:2; rx:16; }
.shadowbox { fill:#111827; stroke:#818cf8; stroke-width:2; rx:16; }

.arrow { stroke:#9ca3af; stroke-width:3; fill:none; marker-end:url(#arrow); }
.dashed { stroke-dasharray:10,8; }

</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
<path d="M0,0 L10,3 L0,6 Z" fill="#9ca3af"/>
</marker>
</defs>

<rect width="100%" height="100%" fill="#0b1220"/>

<text x="600" y="70" text-anchor="middle" class="title">
MoCKA Dual Movement Architecture
</text>

<!-- PRIMARY MOVEMENT -->

<rect x="120" y="150" width="420" height="160" class="box"/>

<text x="330" y="185" text-anchor="middle" class="header">
Primary Movement
</text>

<rect x="160" y="220" width="150" height="50" class="box"/>
<text x="235" y="250" text-anchor="middle" class="label">
Research Pipeline
</text>

<rect x="350" y="220" width="150" height="50" class="box"/>
<text x="425" y="250" text-anchor="middle" class="label">
Verification Flow
</text>

<line x1="310" y1="245" x2="350" y2="245" class="arrow"/>

<!-- SHADOW MOVEMENT -->

<rect x="660" y="340" width="420" height="170" class="shadowbox"/>

<text x="870" y="375" text-anchor="middle" class="header">
Shadow Movement
</text>

<text x="870" y="405" text-anchor="middle" class="small">
Knowledge Circulation Backup
</text>

<rect x="700" y="430" width="170" height="50" class="shadowbox"/>
<text x="785" y="460" text-anchor="middle" class="label">
Fallback Research Path
</text>

<rect x="910" y="430" width="140" height="50" class="shadowbox"/>
<text x="980" y="455" text-anchor="middle" class="label">
Minimum
</text>
<text x="980" y="475" text-anchor="middle" class="label">
Capability 75%
</text>

<line x1="870" y1="455" x2="910" y2="455" class="arrow"/>

<!-- KNOWLEDGE CIRCULATION -->

<path d="M540 230 C780 230 950 260 980 360"
class="arrow"/>

<path d="M980 430 C940 520 500 520 260 330"
class="arrow"/>

<path d="M260 330 C200 300 180 250 200 210"
class="arrow dashed"/>

</svg>
