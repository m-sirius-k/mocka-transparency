<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">

<style>
.title { font: bold 32px sans-serif; fill:#ffffff; }
.layer { font: bold 22px sans-serif; fill:#ffffff; }
.desc { font: 16px sans-serif; fill:#e5e7eb; }

.core { fill:#1f2937; stroke:#60a5fa; stroke-width:2; rx:14; }
.gate { fill:#111827; stroke:#34d399; stroke-width:2; rx:14; }
.trans { fill:#111827; stroke:#f59e0b; stroke-width:2; rx:14; }

.arrow { stroke:#9ca3af; stroke-width:3; marker-end:url(#arrow); }

</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
<path d="M0,0 L10,3 L0,6 Z" fill="#9ca3af"/>
</marker>
</defs>

<rect width="100%" height="100%" fill="#0b1220"/>

<text x="550" y="70" text-anchor="middle" class="title">
MoCKA System Position
</text>

<!-- CORE -->

<rect x="130" y="200" width="260" height="120" class="core"/>

<text x="260" y="235" text-anchor="middle" class="layer">
MoCKA Core
</text>

<text x="260" y="265" text-anchor="middle" class="desc">
AI Reasoning
</text>

<text x="260" y="285" text-anchor="middle" class="desc">
Research Experiments
</text>

<!-- KNOWLEDGE GATE -->

<rect x="420" y="200" width="260" height="120" class="gate"/>

<text x="550" y="235" text-anchor="middle" class="layer">
Knowledge Gate
</text>

<text x="550" y="265" text-anchor="middle" class="desc">
Institutional Memory
</text>

<text x="550" y="285" text-anchor="middle" class="desc">
Context Preservation
</text>

<!-- TRANSPARENCY -->

<rect x="710" y="200" width="260" height="120" class="trans"/>

<text x="840" y="235" text-anchor="middle" class="layer">
Transparency
</text>

<text x="840" y="265" text-anchor="middle" class="desc">
Evidence Generation
</text>

<text x="840" y="285" text-anchor="middle" class="desc">
Public Verification
</text>

<!-- ARROWS -->

<line x1="390" y1="260" x2="420" y2="260" class="arrow"/>
<line x1="680" y1="260" x2="710" y2="260" class="arrow"/>

</svg>
