<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">

<style>
.title { font: bold 34px serif; fill:#ffffff; }
.layer { font: bold 20px serif; fill:#ffffff; }
.text { font: 16px serif; fill:#d1d5db; }

.core { fill:#1f2937; stroke:#60a5fa; stroke-width:2; rx:14; }
.gate { fill:#1f2937; stroke:#34d399; stroke-width:2; rx:14; }
.trans { fill:#1f2937; stroke:#f59e0b; stroke-width:2; rx:14; }

.center { fill:#111827; stroke:#9ca3af; stroke-width:2; rx:20; }

.arrow { stroke:#9ca3af; stroke-width:2; marker-end:url(#arrow); }

</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
<path d="M0,0 L10,3 L0,6 Z" fill="#9ca3af"/>
</marker>
</defs>

<rect width="100%" height="100%" fill="#0b1220"/>

<text x="500" y="70" text-anchor="middle" class="title">MoCKA Verification Architecture</text>

<rect x="420" y="200" width="160" height="80" class="center"/>
<text x="500" y="240" text-anchor="middle" class="layer">MoCKA</text>

<rect x="160" y="200" width="160" height="90" class="core"/>
<text x="240" y="235" text-anchor="middle" class="layer">Core</text>
<text x="240" y="260" text-anchor="middle" class="text">Research Engine</text>

<rect x="420" y="360" width="160" height="90" class="gate"/>
<text x="500" y="395" text-anchor="middle" class="layer">Knowledge Gate</text>
<text x="500" y="420" text-anchor="middle" class="text">Institutional Memory</text>

<rect x="680" y="200" width="160" height="90" class="trans"/>
<text x="760" y="235" text-anchor="middle" class="layer">Transparency</text>
<text x="760" y="260" text-anchor="middle" class="text">Verification Layer</text>

<line x1="320" y1="240" x2="420" y2="240" class="arrow"/>
<line x1="580" y1="240" x2="680" y2="240" class="arrow"/>
<line x1="500" y1="280" x2="500" y2="360" class="arrow"/>

<text x="500" y="500" text-anchor="middle" class="text">
Verifiable Knowledge Infrastructure
</text>

</svg>
